spring.application.name=diagou-backend

# 資料庫連線網址 (從 Supabase 複製的 JDBC URL)
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres

# 帳號 (通常預設是 postgres)
spring.datasource.username=postgres.vcclgpfpgxojlwlslztv

# 密碼 (你建立 Supabase 專案時設的那組)
spring.datasource.password=4P8gh26NEwQOqU9v

# 資料庫驅動程式
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 設定：自動根據你的 Java 程式碼建立資料表 (開發初期建議用 update)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.types_sql_types_check_enabled=false

# JWT
app.jwt.secret=CHANGE_ME_TO_A_SECURE_RANDOM_SECRET_KEY_AT_LEAST_256_BITS
app.jwt.access-token-expiration-ms=1800000
app.jwt.refresh-token-expiration-ms=604800000

# ECPay
app.ecpay.merchant-id=YOUR_MERCHANT_ID
app.ecpay.hash-key=YOUR_HASH_KEY
app.ecpay.hash-iv=YOUR_HASH_IV
app.ecpay.payment-url=https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5
app.ecpay.return-url=http://localhost:8080/api/payments/ecpay/callback
app.ecpay.client-back-url=http://localhost:5173/payment/result

# Cookie
app.cookie.secure=false

# CORS
app.cors.allowed-origins=http://localhost:5173

# 顯示完整的錯誤堆疊資訊
server.error.include-message=always
server.error.include-stacktrace=always

# 顯示 SQL 執行細節 (這能確認資料有沒有真的寫入)
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG