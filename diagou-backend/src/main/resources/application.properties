spring.application.name=diagou-backend

# 資料庫連線網址 (從 Supabase 複製的 JDBC URL)
spring.datasource.url=jdbc:postgresql://db.vcclgpfpgxojlwlslztv.supabase.co:5432/postgres

# 帳號 (通常預設是 postgres)
spring.datasource.username=postgres

# 密碼 (你建立 Supabase 專案時設的那組)
spring.datasource.password=4P8gh26NEwQOqU9v

# 資料庫驅動程式
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 設定：自動根據你的 Java 程式碼建立資料表 (開發初期建議用 update)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect